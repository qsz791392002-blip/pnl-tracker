<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>盈虧追蹤器 P&L Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #0a0c10; }
      body {
        font-family: 'Space Mono', monospace;
        color: #e2e8f0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      input, button { font-family: 'Space Mono', monospace; }
      input { outline: none; }
      input::placeholder { color: #4a5568; }
      input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-thumb { background: #1e2535; border-radius: 4px; }
      .row:hover { background: #1a2030 !important; }
      .del { opacity: 0; transition: opacity .15s; }
      .row:hover .del { opacity: 1; }
      .move-btn { opacity: .55; transition: opacity .15s, transform .15s; }
      .move-btn:hover:not(:disabled) { opacity: 1; transform: translateY(-1px); }
      .move-btn:disabled { opacity: .18; cursor: not-allowed !important; }
      .btn-tab { transition: all .15s; }
      .btn-tab:hover { opacity: .85; }
      @keyframes up { from { opacity:0; transform:translateY(10px);} to { opacity:1; transform:translateY(0);} }
      .up { animation: up .35s ease both; }
      @media (max-width: 680px) {
        .grid-3 { grid-template-columns: 1fr !important; }
        .stats-grid { grid-template-columns: repeat(2,1fr) !important; }
        .log-head, .log-row {
          grid-template-columns: 52px 1fr 78px 70px 84px !important;
        }
      }
      @media (max-width: 460px) {
        .log-wrap { overflow-x: auto; }
        .log-inner { min-width: 520px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useMemo, useEffect } = React;
      const {
        ComposedChart, Area, Line, XAxis, YAxis, CartesianGrid,
        Tooltip, ReferenceLine, ResponsiveContainer,
      } = Recharts;

      const C = {
        bg: "#0a0c10", surface: "#111318", card: "#161b24", border: "#1e2535",
        green: "#00e5a0", red: "#ff4d6a", gold: "#f5c842", goldDim: "#c8a02a",
        muted: "#4a5568", text: "#e2e8f0", subtext: "#718096",
      };

      const SAMPLE = [
        { id: 1, date: "04/01", amount: 1200, xauusd: 2232, note: "" },
        { id: 2, date: "04/02", amount: -450, xauusd: 2218, note: "" },
        { id: 3, date: "04/03", amount: 870, xauusd: 2265, note: "" },
        { id: 4, date: "04/07", amount: -1100, xauusd: 2298, note: "" },
        { id: 5, date: "04/08", amount: 2300, xauusd: 2340, note: "" },
      ];

      const STORAGE_KEY = "xp-pnl-tracker-v1";

      const fmt = (val) => {
        if (val === null || val === undefined || Number.isNaN(val)) return "—";
        const abs = Math.abs(val);
        const sign = val >= 0 ? "+" : "-";
        if (abs >= 10000) return `${sign}${(abs / 1000).toFixed(1)}k`;
        return `${sign}${abs.toLocaleString()}`;
      };

      function CustomTooltip({ active, payload, label }) {
        if (!active || !payload?.length) return null;
        const cum = payload.find((p) => p.dataKey === "cumulative");
        const day = payload.find((p) => p.dataKey === "amount");
        const gold = payload.find((p) => p.dataKey === "xauusd");

        return (
          <div
            style={{
              background: C.card,
              border: `1px solid ${C.border}`,
              borderRadius: 10,
              padding: "10px 14px",
              fontSize: 12,
              color: C.text,
              minWidth: 150,
            }}
          >
            <div style={{ color: C.subtext, marginBottom: 6, fontSize: 11 }}>{label}</div>
            {cum && (
              <div style={{ color: cum.value >= 0 ? C.green : C.red, fontWeight: 700 }}>
                累計 P&amp;L {fmt(cum.value)}
              </div>
            )}
            {day && (
              <div style={{ color: day.value >= 0 ? C.green : C.red, marginTop: 2 }}>
                當日 {fmt(day.value)}
              </div>
            )}
            {gold && gold.value && (
              <div
                style={{
                  color: C.gold,
                  marginTop: 4,
                  borderTop: `1px solid ${C.border}`,
                  paddingTop: 4,
                }}
              >
                XAUUSD ${Number(gold.value).toLocaleString()}
              </div>
            )}
          </div>
        );
      }

      function PnLTracker() {
        const [entries, setEntries] = useState(() => {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return SAMPLE;
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : SAMPLE;
          } catch {
            return SAMPLE;
          }
        });

        const [form, setForm] = useState({ date: "", amount: "", xauusd: "", note: "" });
        const [editId, setEditId] = useState(null);
        const [tab, setTab] = useState("chart");

        useEffect(() => {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        }, [entries]);

        const chartData = useMemo(() => {
          let cum = 0;
          return entries.map((e) => {
            cum += e.amount;
            return {
              date: e.date,
              amount: e.amount,
              cumulative: cum,
              xauusd: e.xauusd || null,
            };
          });
        }, [entries]);

        const stats = useMemo(() => {
          if (!entries.length) return null;
          const total = entries.reduce((s, e) => s + e.amount, 0);
          const wins = entries.filter((e) => e.amount > 0);
          return {
            total,
            winRate: ((wins.length / entries.length) * 100).toFixed(0),
            best: Math.max(...entries.map((e) => e.amount)),
            worst: Math.min(...entries.map((e) => e.amount)),
            days: entries.length,
          };
        }, [entries]);

        const goldEntries = entries.filter((e) => e.xauusd);
        const goldRange = goldEntries.length
          ? [
              Math.min(...goldEntries.map((e) => e.xauusd)) - 30,
              Math.max(...goldEntries.map((e) => e.xauusd)) + 30,
            ]
          : [2000, 2500];

        const isPos = stats?.total >= 0;

        const handleSubmit = () => {
          if (!form.date || !form.amount) return;
          const amount = parseFloat(form.amount);
          if (Number.isNaN(amount)) return;
          const xauusd = form.xauusd ? parseFloat(form.xauusd) : null;

          if (editId !== null) {
            setEntries((prev) =>
              prev.map((e) =>
                e.id === editId
                  ? { ...e, date: form.date, amount, xauusd, note: form.note }
                  : e
              )
            );
            setEditId(null);
          } else {
            setEntries((prev) => [
              ...prev,
              { id: Date.now(), date: form.date, amount, xauusd, note: form.note },
            ]);
          }

          setForm({ date: "", amount: "", xauusd: "", note: "" });
        };

        const handleEdit = (e) => {
          setEditId(e.id);
          setForm({
            date: e.date,
            amount: String(e.amount),
            xauusd: e.xauusd ? String(e.xauusd) : "",
            note: e.note || "",
          });
          setTab("chart");
          window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        };

        const moveEntry = (index, direction) => {
          setEntries((prev) => {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= prev.length) return prev;
            const next = [...prev];
            [next[index], next[newIndex]] = [next[newIndex], next[index]];
            return next;
          });
        };

        const clearAll = () => {
          if (!confirm("確定要清空所有紀錄嗎？")) return;
          setEntries([]);
          setEditId(null);
          setForm({ date: "", amount: "", xauusd: "", note: "" });
        };

        const resetDemo = () => {
          if (!confirm("要恢復示範資料嗎？這會覆蓋目前紀錄。")) return;
          setEntries(SAMPLE);
          setEditId(null);
          setForm({ date: "", amount: "", xauusd: "", note: "" });
        };

        const exportData = () => {
          const blob = new Blob([JSON.stringify(entries, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `pnl-tracker-${new Date().toISOString().slice(0,10)}.json`;
          a.click();
          URL.revokeObjectURL(url);
        };

        const importData = (ev) => {
          const file = ev.target.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const parsed = JSON.parse(reader.result);
              if (!Array.isArray(parsed)) throw new Error("bad");
              setEntries(parsed);
              alert("已匯入成功 ✨");
            } catch {
              alert("匯入失敗，檔案格式不正確。")
            }
          };
          reader.readAsText(file);
          ev.target.value = "";
        };

        return (
          <div
            style={{
              minHeight: "100vh",
              background: C.bg,
              color: C.text,
              paddingBottom: 48,
            }}
          >
            <div style={{ maxWidth: 600, margin: "0 auto", padding: "28px 24px 0" }}>
              <div className="up" style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 12 }}>
                <div>
                  <div style={{ fontFamily: "Syne, sans-serif", fontSize: 22, fontWeight: 800, letterSpacing: "-.5px" }}>
                    盈虧追蹤器
                  </div>
                  <div style={{ color: C.subtext, fontSize: 11, marginTop: 2, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                    <span>P&amp;L</span>
                    <span style={{ color: C.border }}>×</span>
                    <span style={{ color: C.gold }}>XAUUSD</span>
                    <span style={{ color: C.border }}>×</span>
                    <span>可手動移動排序</span>
                  </div>
                </div>

                {stats && (
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontFamily: "Syne, sans-serif", fontSize: 26, fontWeight: 800, color: isPos ? C.green : C.red, lineHeight: 1 }}>
                      {fmt(stats.total)}
                    </div>
                    <div style={{ color: C.subtext, fontSize: 10, marginTop: 2 }}>累計盈虧</div>
                  </div>
                )}
              </div>
            </div>

            {stats && (
              <div className="up stats-grid" style={{ maxWidth: 600, margin: "16px auto 0", padding: "0 24px", display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, animationDelay: ".05s" }}>
                {[
                  { l: "勝率", v: `${stats.winRate}%`, c: C.green },
                  { l: "天數", v: stats.days, c: null },
                  { l: "最佳", v: fmt(stats.best), c: C.green },
                  { l: "最差", v: fmt(stats.worst), c: C.red },
                ].map((s) => (
                  <div key={s.l} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", textAlign: "center" }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: s.c || C.text }}>{s.v}</div>
                    <div style={{ fontSize: 10, color: C.subtext, marginTop: 3 }}>{s.l}</div>
                  </div>
                ))}
              </div>
            )}

            <div className="up" style={{ maxWidth: 600, margin: "14px auto 0", padding: "0 24px", display: "flex", gap: 8, animationDelay: ".08s" }}>
              {[["chart", "📈 趨勢圖"], ["log", "📋 紀錄"]].map(([t, label]) => (
                <button
                  key={t}
                  className="btn-tab"
                  onClick={() => setTab(t)}
                  style={{
                    background: tab === t ? C.green : C.card,
                    color: tab === t ? "#000" : C.subtext,
                    border: `1px solid ${tab === t ? C.green : C.border}`,
                    borderRadius: 8,
                    padding: "6px 18px",
                    fontSize: 12,
                    fontWeight: 700,
                    cursor: "pointer",
                  }}
                >
                  {label}
                </button>
              ))}
            </div>

            {tab === "chart" && (
              <div className="up" style={{ maxWidth: 600, margin: "12px auto 0", padding: "0 24px", animationDelay: ".12s" }}>
                <div style={{ display: "flex", gap: 10, marginBottom: 10, flexWrap: "wrap" }}>
                  {[
                    { color: isPos ? C.green : C.red, label: "累計 P&L", dashed: false },
                    { color: C.gold, label: "XAUUSD 金價", dashed: true },
                  ].map((pill) => (
                    <div key={pill.label} style={{ display: "flex", alignItems: "center", gap: 7, background: C.card, border: `1px solid ${C.border}`, borderRadius: 20, padding: "4px 12px", fontSize: 11, color: C.subtext }}>
                      <svg width="18" height="8">
                        <line x1="0" y1="4" x2="18" y2="4" stroke={pill.color} strokeWidth="2" strokeDasharray={pill.dashed ? "4 2" : "0"} />
                      </svg>
                      {pill.label}
                    </div>
                  ))}
                  {goldEntries.length === 0 && <div style={{ fontSize: 10, color: C.muted, alignSelf: "center" }}>← 輸入金價後顯示</div>}
                </div>

                <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "18px 4px 10px" }}>
                  {chartData.length > 0 ? (
                    <ResponsiveContainer width="100%" height={220}>
                      <ComposedChart data={chartData} margin={{ top: 5, right: goldEntries.length ? 52 : 10, left: 0, bottom: 0 }}>
                        <defs>
                          <linearGradient id="pnlG" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="5%" stopColor={isPos ? C.green : C.red} stopOpacity={0.2} />
                            <stop offset="95%" stopColor={isPos ? C.green : C.red} stopOpacity={0} />
                          </linearGradient>
                        </defs>

                        <CartesianGrid stroke={C.border} strokeDasharray="3 3" vertical={false} />
                        <XAxis dataKey="date" tick={{ fill: C.subtext, fontSize: 10, fontFamily: "Space Mono" }} axisLine={false} tickLine={false} />
                        <YAxis yAxisId="pnl" tick={{ fill: C.subtext, fontSize: 10, fontFamily: "Space Mono" }} axisLine={false} tickLine={false} tickFormatter={(v) => fmt(v)} width={54} />
                        {goldEntries.length > 0 && (
                          <YAxis yAxisId="gold" orientation="right" domain={goldRange} tick={{ fill: C.goldDim, fontSize: 10, fontFamily: "Space Mono" }} axisLine={false} tickLine={false} tickFormatter={(v) => `$${v}`} width={52} />
                        )}

                        <Tooltip content={<CustomTooltip />} />
                        <ReferenceLine yAxisId="pnl" y={0} stroke={C.border} strokeWidth={1.5} />

                        <Area yAxisId="pnl" type="monotone" dataKey="cumulative" stroke={isPos ? C.green : C.red} strokeWidth={2.5} fill="url(#pnlG)" dot={{ fill: isPos ? C.green : C.red, r: 3, strokeWidth: 0 }} activeDot={{ r: 5, strokeWidth: 0 }} />

                        {goldEntries.length > 0 && (
                          <Line yAxisId="gold" type="monotone" dataKey="xauusd" stroke={C.gold} strokeWidth={2} strokeDasharray="5 3" dot={{ fill: C.gold, r: 2.5, strokeWidth: 0 }} activeDot={{ r: 4.5, strokeWidth: 0 }} connectNulls />
                        )}
                      </ComposedChart>
                    </ResponsiveContainer>
                  ) : (
                    <div style={{ height: 220, display: "flex", alignItems: "center", justifyContent: "center", color: C.muted, fontSize: 13 }}>
                      尚無資料，請新增紀錄 ↓
                    </div>
                  )}
                </div>

                {chartData.length > 0 && (
                  <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 14px 10px", marginTop: 10 }}>
                    <div style={{ fontSize: 10, color: C.subtext, marginBottom: 10 }}>每日盈虧</div>
                    <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 60 }}>
                      {chartData.map((d) => {
                        const max = Math.max(...chartData.map((x) => Math.abs(x.amount)), 1);
                        const h = Math.max((Math.abs(d.amount) / max) * 52, 4);
                        return (
                          <div key={`${d.date}-${d.amount}-${d.cumulative}`} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                            <div title={`${d.date}: ${fmt(d.amount)}`} style={{ width: "100%", height: h, background: d.amount >= 0 ? C.green : C.red, borderRadius: 4, opacity: .85 }} />
                            <div style={{ fontSize: 8, color: C.subtext, whiteSpace: "nowrap", overflow: "hidden", maxWidth: "100%" }}>{d.date}</div>
                          </div>
                        )
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}

            {tab === "log" && (
              <div className="up" style={{ maxWidth: 600, margin: "12px auto 0", padding: "0 24px", animationDelay: ".12s" }}>
                <div className="log-wrap" style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, overflow: "hidden" }}>
                  <div className="log-inner">
                    <div className="log-head" style={{ display: "grid", gridTemplateColumns: "55px 1fr 90px 76px 88px", padding: "8px 16px", borderBottom: `1px solid ${C.border}`, fontSize: 10, color: C.muted, gap: 8 }}>
                      <span>日期</span>
                      <span>備註</span>
                      <span style={{ textAlign: "right" }}>盈虧</span>
                      <span style={{ textAlign: "right" }}>金價</span>
                      <span style={{ textAlign: "right" }}>操作</span>
                    </div>

                    {entries.length === 0 && (
                      <div style={{ padding: 20, textAlign: "center", color: C.muted, fontSize: 13 }}>尚無紀錄</div>
                    )}

                    {entries.map((e, i) => (
                      <div key={e.id} className="row log-row" style={{ display: "grid", gridTemplateColumns: "55px 1fr 90px 76px 88px", gap: 8, alignItems: "center", padding: "11px 16px", borderBottom: i < entries.length - 1 ? `1px solid ${C.border}` : "none", background: "transparent", transition: "background .15s" }}>
                        <span style={{ fontSize: 11, color: C.subtext }}>{e.date}</span>
                        <span style={{ fontSize: 11, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.note || "—"}</span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: e.amount >= 0 ? C.green : C.red, textAlign: "right" }}>{fmt(e.amount)}</span>
                        <span style={{ fontSize: 11, color: e.xauusd ? C.gold : C.muted, textAlign: "right" }}>{e.xauusd ? `$${e.xauusd}` : "—"}</span>

                        <div style={{ display: "flex", gap: 2, justifyContent: "flex-end" }}>
                          <button className="move-btn" onClick={() => moveEntry(i, -1)} disabled={i === 0} style={{ background: "none", border: "none", color: C.subtext, cursor: "pointer", fontSize: 12, padding: "2px" }} title="上移">↑</button>
                          <button className="move-btn" onClick={() => moveEntry(i, 1)} disabled={i === entries.length - 1} style={{ background: "none", border: "none", color: C.subtext, cursor: "pointer", fontSize: 12, padding: "2px" }} title="下移">↓</button>
                          <button onClick={() => handleEdit(e)} style={{ background: "none", border: "none", color: C.subtext, cursor: "pointer", fontSize: 12, padding: "2px" }} title="編輯">✏️</button>
                          <button className="del" onClick={() => setEntries((p) => p.filter((x) => x.id !== e.id))} style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 12, padding: "2px" }} title="刪除">✕</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            <div className="up" style={{ maxWidth: 600, margin: "14px auto 0", padding: "0 24px", animationDelay: ".18s" }}>
              <div style={{ background: C.card, border: `1px solid ${editId ? C.green : C.border}`, borderRadius: 14, padding: 16, transition: "border-color .2s" }}>
                <div style={{ fontSize: 10, color: editId ? C.green : C.subtext, marginBottom: 12, fontWeight: 700 }}>
                  {editId ? "✏️ 編輯紀錄" : "＋ 新增紀錄"}
                </div>

                <div className="grid-3" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                  {[
                    { label: "日期", key: "date", ph: "04/16", type: "text", color: () => C.text },
                    {
                      label: "盈虧金額",
                      key: "amount",
                      ph: "+1200 / -500",
                      type: "number",
                      color: () => form.amount ? (parseFloat(form.amount) >= 0 ? C.green : C.red) : C.text,
                    },
                    {
                      label: "XAUUSD 金價（選填）",
                      key: "xauusd",
                      ph: "2345",
                      type: "number",
                      color: () => form.xauusd ? C.gold : C.text,
                    },
                  ].map((f) => (
                    <div key={f.key}>
                      <div style={{ fontSize: 10, color: C.subtext, marginBottom: 5 }}>{f.label}</div>
                      <input
                        type={f.type}
                        value={form[f.key]}
                        onChange={(ev) => setForm((p) => ({ ...p, [f.key]: ev.target.value }))}
                        placeholder={f.ph}
                        style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 10px", fontSize: 12, color: f.color() }}
                      />
                    </div>
                  ))}
                </div>

                <div style={{ marginTop: 8 }}>
                  <div style={{ fontSize: 10, color: C.subtext, marginBottom: 5 }}>備註（選填）</div>
                  <input
                    value={form.note}
                    onChange={(e) => setForm((p) => ({ ...p, note: e.target.value }))}
                    placeholder="例：開倉太急，停損執行"
                    style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 10px", fontSize: 12, color: C.text }}
                  />
                </div>

                <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                  <button onClick={handleSubmit} style={{ flex: 1, minWidth: 120, background: C.green, color: "#000", border: "none", borderRadius: 8, padding: "10px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                    {editId ? "儲存變更" : "新增"}
                  </button>

                  {editId && (
                    <button onClick={() => { setEditId(null); setForm({ date: "", amount: "", xauusd: "", note: "" }); }} style={{ background: C.surface, color: C.subtext, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 16px", fontSize: 12, cursor: "pointer" }}>
                      取消
                    </button>
                  )}
                </div>

                <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                  <button onClick={exportData} style={{ background: C.surface, color: C.text, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", fontSize: 11, cursor: "pointer" }}>匯出 JSON</button>
                  <label style={{ background: C.surface, color: C.text, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", fontSize: 11, cursor: "pointer" }}>
                    匯入 JSON
                    <input type="file" accept="application/json" onChange={importData} style={{ display: "none" }} />
                  </label>
                  <button onClick={resetDemo} style={{ background: C.surface, color: C.subtext, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", fontSize: 11, cursor: "pointer" }}>恢復示範資料</button>
                  <button onClick={clearAll} style={{ background: "transparent", color: C.red, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", fontSize: 11, cursor: "pointer" }}>清空全部</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<PnLTracker />);
    </script>
  </body>
</html>
